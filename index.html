<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童识字小报生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #fff9e6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .input-area {
            margin: 20px 0;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ffd93d;
            border-radius: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #4ecdc4;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #38b0a9;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #fdf8e4;
            border-radius: 10px;
            line-height: 1.8;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 儿童识字小报生成器</h1>
        <div class="input-area">
            <textarea placeholder="请输入儿童生字、词语或句子，一键生成小报内容……"></textarea>
            <button onclick="generatePaper()">生成小报</button>
        </div>
        <div class="result" id="result"></div>
    </div>

    <script>
        function generatePaper() {
            let text = document.querySelector("textarea").value;
            if (!text) {
                alert("请输入内容！");
                return;
            }
            let result = `
            <h3>✨ 儿童识字小报</h3>
            <p>📖 学习内容：${text}</p>
            <p>⭐ 每天读一读，识字更轻松！</p>
            `;
            document.getElementById("result").innerHTML = result;
        }
    </script>
</body>
</html>
