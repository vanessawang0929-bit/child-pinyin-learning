<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童识字小报生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #fff9e6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .input-area {
            margin: 20px 0;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ffd93d;
            border-radius: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #4ecdc4;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #38b0a9;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #fdf8e4;
            border-radius: 10px;
            line-height: 1.8;
            font-size: 18px;
            text-align: center;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 儿童识字小报生成器</h1>
        <div class="input-area">
            <textarea placeholder="请输入生字，例如：春天、学校、家人、水果"></textarea>
            <button onclick="generatePaper()">生成小报图片</button>
        </div>
        <div class="result" id="result"></div>
    </div>

    <script>
        async function generatePaper() {
            let text = document.querySelector("textarea").value.trim();
            if (!text) {
                alert("请输入内容！");
                return;
            }

            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "⏳ 正在生成小报图片，请稍候...";

            try {
                let prompt = `儿童识字小报，主题：${text}，卡通风格，色彩明亮，适合小学生，清晰美观`;
                
                let res = await fetch("https://api.nanobanana.pro/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });

                let data = await res.json();
                let imageUrl = data.imageUrl;

                resultDiv.innerHTML = `
                    <h3>✅ 生成成功！</h3>
                    <img src="${imageUrl}" alt="识字小报">
                    <p>📖 学习内容：${text}</p>
                `;
            } catch (err) {
                resultDiv.innerHTML = "❌ 生成失败，请重试";
            }
        }
    </script>
</body>
</html>
