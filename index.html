<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>儿童识字小报生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #fff7ed 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #ea580c;
      font-size: 1.875rem;
      margin-bottom: 2rem;
    }
    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    h2 {
      font-size: 1.25rem;
      color: #1f2937;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }
    .topic-btn {
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      background: white;
      cursor: pointer;
      text-align: center;
      font-weight: 500;
      color: #374151;
      transition: all 0.2s;
    }
    .topic-btn:hover {
      border-color: #f97316;
      background: #fff7ed;
    }
    .topic-btn.selected {
      border-color: #f97316;
      background: #fff7ed;
      box-shadow: 0 0 0 2px #fb923c40;
    }
    .custom-link {
      text-align: center;
      margin-top: 1rem;
    }
    .custom-link button {
      background: none;
      border: none;
      color: #f97316;
      cursor: pointer;
      font-weight: 500;
    }
    .preset-info {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .preset-info .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .preset-info .topic-label {
      font-weight: 600;
      color: #c2410c;
    }
    .preset-info .change-btn {
      font-size: 0.875rem;
      color: #f97316;
      background: none;
      border: none;
      cursor: pointer;
    }
    .preset-info .titles {
      margin-top: 0.75rem;
    }
    .preset-info .titles-label {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }
    .preset-info .title-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .preset-info .title-btn {
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      border: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
    }
    .preset-info .title-btn.selected {
      background: #f97316;
      color: white;
      border-color: #f97316;
    }
    .preset-info .words-preview {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #fed7aa;
    }
    .preset-info .words-label {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }
    .preset-info .word-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .preset-info .word-tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }
    input[type="text"], textarea, input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }
    textarea {
      font-family: monospace;
      height: 16rem;
      resize: vertical;
    }
    .btn {
      width: 100%;
      padding: 0.875rem;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #ea580c; }
    .btn:disabled { background: #d1d5db; cursor: not-allowed; }
    .btn-secondary {
      width: auto;
      background: white;
      border: 1px solid #d1d5db;
      color: #374151;
      padding: 0.875rem 1.5rem;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .btn-row .btn { flex: 1; }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .alert-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      text-align: center;
    }
    .result-img {
      width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    .result-btns {
      display: flex;
      gap: 1rem;
    }
    .result-btns .btn-secondary {
      flex: 1;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>儿童识字小报生成器</h1>

    <div id="alertError" class="alert alert-error hidden"></div>

    <!-- Step 1: Select Topic -->
    <div id="stepSelect" class="card">
      <h2>选择主题</h2>
      <div class="grid" id="topicGrid"></div>
      <div class="custom-link">
        <button onclick="showCustomTopic()">或者自定义主题 →</button>
      </div>
    </div>

    <!-- Step 2: Input Form -->
    <div id="stepInput" class="hidden">
      <div id="presetInfo" class="preset-info hidden"></div>
      <div class="card">
        <div class="form-group">
          <label>主题/场景</label>
          <input type="text" id="topicInput" placeholder="如：超市、医院、公园">
        </div>
        <div class="form-group">
          <label>小报标题</label>
          <input type="text" id="titleInput" placeholder="如：《走进超市》《快乐医院》">
        </div>
        <button id="generateBtn" class="btn" onclick="generatePrompt()">生成提示词</button>
      </div>
    </div>

    <!-- Step 3: Confirm Prompt -->
    <div id="stepConfirm" class="hidden">
      <div class="card">
        <h2>编辑提示词</h2>
        <p style="color:#6b7280;font-size:0.875rem;margin-bottom:1rem">
          请确认或修改以下提示词，然后输入 API Key 开始生成图片
        </p>
        <textarea id="promptTextarea"></textarea>
        <div class="form-group" style="margin-top:1rem">
          <label>API Key (kie.ai)</label>
          <input type="password" id="apiKeyInput" placeholder="输入您的 API Key">
        </div>
        <div class="btn-row">
          <button id="confirmBtn" class="btn" onclick="generateImage()">确认并生成图片</button>
          <button class="btn btn-secondary" onclick="resetAll()">重新开始</button>
        </div>
      </div>
      <div id="pollingAlert" class="alert alert-info hidden">正在生成图片，请稍候...</div>
    </div>

    <!-- Step 4: Result -->
    <div id="stepResult" class="hidden">
      <div class="card">
        <h2>生成结果</h2>
        <div id="resultImages"></div>
      </div>
    </div>
  </div>

    let selectedPreset = null;

    // Initialize topic grid
    function initTopicGrid() {
      const grid = document.getElementById('topicGrid');
      grid.innerHTML = PRESETS.map(p => `
        <button class="topic-btn" onclick="selectPreset('${p.topic}')">${p.topic}</button>
      `).join('');
    }

    function selectPreset(topic) {
      selectedPreset = PRESETS.find(p => p.topic === topic);
      showPresetInfo();
      document.getElementById('topicInput').value = selectedPreset.topic;
      document.getElementById('titleInput').value = '';
      document.getElementById('stepSelect').classList.add('hidden');
      document.getElementById('stepInput').classList.remove('hidden');
    }

    function showCustomTopic() {
      selectedPreset = null;
      document.getElementById('presetInfo').classList.add('hidden');
      document.getElementById('topicInput').value = '';
      document.getElementById('titleInput').value = '';
      document.getElementById('stepSelect').classList.add('hidden');
      document.getElementById('stepInput').classList.remove('hidden');
    }

    function showPresetInfo() {
      if (!selectedPreset) return;
      const info = document.getElementById('presetInfo');
      const allWords = [
        ...selectedPreset.words.coreRoles,
        ...selectedPreset.words.commonItems,
        ...selectedPreset.words.environment,
      ];
      info.innerHTML = `
        <div class="title-row">
          <span class="topic-label">已选择: ${selectedPreset.topic}</span>
          <button class="change-btn" onclick="changePreset()">更换</button>
        </div>
        <div class="titles">
          <div class="titles-label">推荐标题：</div>
          <div class="title-btns">
            ${selectedPreset.titles.map(t => `
              <button class="title-btn" onclick="selectTitle('${t}')">${t}</button>
            `).join('')}
          </div>
        </div>
        <div class="words-preview">
          <div class="words-label">预设词汇预览：</div>
          <div class="word-tags">
            ${allWords.map(w => `<span class="word-tag">${w.h}</span>`).join('')}
          </div>
        </div>
      `;
      info.classList.remove('hidden');
    }

    function selectTitle(title) {
      document.getElementById('titleInput').value = title;
      document.querySelectorAll('.title-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent.trim() === title);
      });
    }

    function changePreset() {
      selectedPreset = null;
      document.getElementById('stepInput').classList.add('hidden');
      document.getElementById('stepSelect').classList.remove('hidden');
    }

    function generatePrompt() {
      const topic = document.getElementById('topicInput').value.trim();
      const title = document.getElementById('titleInput').value.trim();
      if (!topic || !title) {
        showError('请输入主题和标题');
        return;
      }

      let coreRolesText = '';
      let commonItemsText = '';
      let environmentText = '';

      if (selectedPreset) {
        coreRolesText = selectedPreset.words.coreRoles.map(w => `${w.p} ${w.h}`).join(', ');
        commonItemsText = selectedPreset.words.commonItems.map(w => `${w.p} ${w.h}`).join(', ');
        environmentText = selectedPreset.words.environment.map(w => `${w.p} ${w.h}`).join(', ');
      } else {
        coreRolesText = 'shōu yín yuán 收银员, gù kè 顾客, tuī chē 推车';
        commonItemsText = 'píng guǒ 苹果, niú nǎi 牛奶, miàn bāo 面包, shuǐ guǒ 水果';
        environmentText = 'huò jià 货架, chū kǒu 出口, rù kǒu 入口';
      }

      currentPrompt = `请生成一张儿童识字小报《${topic}》，竖版 A4，学习小报版式，适合 5–9 岁孩子 认字与看图识物。

# 一、小报标题区（顶部）

**顶部居中大标题**：《${title}》
* **风格**：十字小报 / 儿童学习报感
* **文本要求**：大字、醒目、卡通手写体、彩色描边
* **装饰**：周围添加与 ${topic} 相关的贴纸风装饰，颜色鲜艳

# 二、小报主体（中间主画面）

画面中心是一幅 **卡通插画风的「${topic}」场景**：
* **整体气氛**：明亮、温暖、积极
* **构图**：物体边界清晰，方便对应文字，不要过于拥挤。

**场景分区与核心内容**
1.  **核心区域 A（主要对象）**：表现 ${topic} 的核心活动。
2.  **核心区域 B（配套设施）**：展示相关的工具或物品。
3.  **核心区域 C（环境背景）**：体现环境特征（如墙面、指示牌等）。

**主题人物**
* **角色**：1 位可爱卡通人物（职业/身份：与 ${topic} 匹配）。
* **动作**：正在进行与场景相关的自然互动。

# 三、必画物体与识字清单（Generated Content）

**请务必在画面中清晰绘制以下物体，并为其预留贴标签的位置：**

**1. 核心角色与设施：**
${coreRolesText}

**2. 常见物品/工具：**
${commonItemsText}

**3. 环境与装饰：**
${environmentText}

*(注意：画面中的物体数量不限于此，但以上列表必须作为重点描绘对象)*

# 四、识字标注规则

* **格式**：两行制（第一行拼音带声调，第二行简体汉字）。
* **样式**：彩色小贴纸风格，白底黑字或深色字，清晰可读。

* **风格**：儿童绘本风 + 识字小报风

      document.getElementById('promptTextarea').value = currentPrompt;
      document.getElementById('stepInput').classList.add('hidden');
      document.getElementById('stepConfirm').classList.remove('hidden');
    }

    async function generateImage() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        showError('请输入 API Key');
        return;
      }

      const prompt = document.getElementById('promptTextarea').value.trim();
      if (!prompt) {
        showError('提示词不能为空');
        return;
      }

      document.getElementById('pollingAlert').classList.remove('hidden');
      document.getElementById('confirmBtn').disabled = true;

      try {
        // Create task
        const createRes = await fetch('https://api.kie.ai/api/v1/jobs/createTask', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'nano-banana-pro',
            input: {
              prompt,
              image_input: [],
              aspect_ratio: '3:4',
              resolution: '2K',
              output_format: 'png',
            },
          }),
        });

        const createData = await createRes.json();
        if (createData.code !== 200) {
          throw new Error(createData.msg || '创建任务失败');
        }

        const taskId = createData.data.taskId;
        pollForResult(taskId, apiKey);
      } catch (err) {
        hideError();
        showError(err.message);
        document.getElementById('pollingAlert').classList.add('hidden');
        document.getElementById('confirmBtn').disabled = false;
      }
    }

    async function pollForResult(taskId, apiKey) {
      const maxAttempts = 60;
      const intervalMs = 5000;

      for (let i = 0; i < maxAttempts; i++) {
        try {
          const res = await fetch(`https://api.kie.ai/api/v1/jobs/recordInfo?taskId=${taskId}`, {
            headers: { 'Authorization': `Bearer ${apiKey}` },
          });
          const data = await res.json();

          if (data.data.state === 'success') {
            const urls = JSON.parse(data.data.resultJson || '{}').resultUrls || [];
            showResult(urls);
            return;
          }

          if (data.data.state === 'fail') {
            throw new Error(data.data.failMsg || '生成失败');
          }
        } catch (err) {
          showError(err.message);
          document.getElementById('pollingAlert').classList.add('hidden');
          document.getElementById('confirmBtn').disabled = false;
          return;
        }

        await new Promise(r => setTimeout(r, intervalMs));
      }

      showError('等待超时');
      document.getElementById('pollingAlert').classList.add('hidden');
      document.getElementById('confirmBtn').disabled = false;
    }

    function showResult(urls) {
      document.getElementById('pollingAlert').classList.add('hidden');
      document.getElementById('stepConfirm').classList.add('hidden');
      document.getElementById('stepResult').classList.remove('hidden');

      // Add new URLs to history
      imageHistory = imageHistory.concat(urls);
      currentIndex = imageHistory.length - 1;

      renderCurrentImage();
    }

    function renderCurrentImage() {
      const container = document.getElementById('resultImages');
      const url = imageHistory[currentIndex];
      container.innerHTML = `
        <img class="result-img" src="${url}" alt="生成结果">
        <div class="result-btns">
          <button class="btn btn-secondary" onclick="regenerate()">重新生成</button>
          <button class="btn btn-secondary" onclick="prevImage()" ${currentIndex <= 0 ? 'disabled' : ''}>上一张</button>
        </div>
      `;
    }

    function regenerate() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        showError('请输入 API Key');
        return;
      }

      document.getElementById('stepResult').classList.add('hidden');
      document.getElementById('pollingAlert').classList.remove('hidden');

      const prompt = document.getElementById('promptTextarea').value.trim();

      fetch('https://api.kie.ai/api/v1/jobs/createTask', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'nano-banana-pro',
          input: {
            prompt,
            image_input: [],
            aspect_ratio: '3:4',
            resolution: '2K',
            output_format: 'png',
          },
        }),
      })
      .then(res => res.json())
      .then(data => {
        if (data.code !== 200) throw new Error(data.msg || '创建任务失败');
        pollForResult(data.data.taskId, apiKey);
      })
      .catch(err => {
        showError(err.message);
        document.getElementById('pollingAlert').classList.add('hidden');
        document.getElementById('stepResult').classList.remove('hidden');
      });
    }

    function prevImage() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCurrentImage();
      }
    }

    function showError(msg) {
      const el = document.getElementById('alertError');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('alertError').classList.add('hidden');
    }

    function resetAll() {
      selectedPreset = null;
      currentPrompt = '';
      imageHistory = [];
      currentIndex = -1;
      document.getElementById('topicInput').value = '';
      document.getElementById('titleInput').value = '';
      document.getElementById('apiKeyInput').value = '';
      document.getElementById('promptTextarea').value = '';
      document.getElementById('alertError').classList.add('hidden');
      document.getElementById('pollingAlert').classList.add('hidden');
      document.getElementById('confirmBtn').disabled = false;
      document.getElementById('stepSelect').classList.remove('hidden');
      document.getElementById('stepInput').classList.add('hidden');
      document.getElementById('stepConfirm').classList.add('hidden');
      document.getElementById('stepResult').classList.add('hidden');
      document.getElementById('presetInfo').classList.add('hidden');
    }

    initTopicGrid();
  </script>
</body>
